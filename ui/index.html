<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halcyon Credit - Underwriter Copilot</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="auth-container glass-panel">
        <div class="auth-header">
          <h1>Halcyon Credit</h1>
          <p>Agentic Underwriting Copilot</p>
        </div>

        <div id="alert-box" class="alert hidden"></div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form">
          <h2>Sign In</h2>
          <div class="input-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required placeholder="underwriter@halcyon.com">
          </div>
          <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn primary-btn">Login</button>
          <p class="switch-mode">New here? <a href="#" id="show-register">Create an account</a></p>
        </form>

        <!-- Register Form (Hidden by default) -->
        <form id="register-form" class="auth-form hidden">
          <h2>Create Account</h2>
          <div class="input-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" required placeholder="underwriter@halcyon.com">
          </div>
          <div class="input-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn primary-btn">Register</button>
          <p class="switch-mode">Already have an account? <a href="#" id="show-login">Sign In</a></p>
        </form>

        <!-- Dashboard Placeholder (Hidden by default) -->
        <div id="dashboard-view" class="dashboard hidden">
          <h2>Welcome, Underwriter!</h2>
          <p id="user-info"></p>
          <div class="dashboard-stats">
            <div class="stat-card">
              <h3>Pending Reviews</h3>
              <p class="stat-value">12</p>
            </div>
            <div class="stat-card">
              <h3>Avg Handle Time</h3>
              <p class="stat-value">18m</p>
            </div>
          </div>
          <button id="logout-btn" class="btn secondary-btn">Logout</button>
        </div>

      </div>
    </div>
    <div class="background-elements">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
